services:
  app:
    build: .
    ports:
      - "4000:4000"
    volumes:
      - .:/app
    command: make dev
    environment:
      PORT: "4000"
      DATABASE_URL: "postgres://student:student@db.hexlet.app:5432/chartsdb"
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:4000/health', timeout=2).read()\""]
      interval: 10s
      timeout: 3s
      retries: 5
    mem_limit: 512m
    cpus: 0.5
